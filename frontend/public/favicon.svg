<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Two connected architecture nodes with an AI sparkle -->
  <!-- Node 1 (service) -->
  <rect x="2" y="4" width="12" height="10" rx="2" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5"/>
  <!-- Node 2 (database) -->
  <rect x="18" y="18" width="12" height="10" rx="2" fill="#8b5cf6" stroke="#5b21b6" stroke-width="1.5"/>
  <!-- Connection line -->
  <line x1="14" y1="9" x2="18" y2="23" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Arrow head -->
  <polygon points="18,23 15,20 17.5,21" fill="#6b7280"/>
  <!-- AI sparkle -->
  <g transform="translate(22,4)" fill="#eab308">
    <polygon points="4,0 5,3 8,4 5,5 4,8 3,5 0,4 3,3" />
  </g>
</svg>
