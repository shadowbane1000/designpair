# PR preview deployment template
# Usage: PR_NUMBER=10 docker compose -f docker-compose.pr.yml -p designpair-pr-10 up -d
services:
  frontend:
    image: designpair-frontend:pr-${PR_NUMBER}
    ports:
      - "127.0.0.1:${PR_PORT:-9010}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: designpair-backend:pr-${PR_NUMBER}
    expose:
      - "8081"
    env_file: .env
    restart: unless-stopped
