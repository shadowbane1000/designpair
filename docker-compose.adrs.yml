services:
  app:
    image: adrinsight:designpair
    ports:
      - "127.0.0.1:8082:8081"
    env_file: .env
    command:
      - ./adr-insight
      - serve
      - --adr-dir
      - /data/adr
      - --db
      - /data/adr-insight.db
      - --ollama-url
      - http://portfolio-ollama:11434
    volumes:
      - ./adr-insight.db:/data/adr-insight.db
      - ./docs/adr:/data/adr:ro
    networks:
      - portfolio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  portfolio:
    external: true
