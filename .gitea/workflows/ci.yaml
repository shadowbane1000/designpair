name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  lint-test-build:
    runs-on: large
    if: github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Go
        run: |
          curl -sL https://go.dev/dl/go1.24.13.linux-amd64.tar.gz | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> $GITHUB_PATH
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build backend
        run: cd backend && go build -o /dev/null ./cmd/designpair

  deploy-app:
    runs-on: large
    needs: lint-test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          curl -sL https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz | tar -xz -C /tmp docker/docker
          cp /tmp/docker/docker /usr/local/bin/

      - name: Build Docker images
        run: |
          docker build -t designpair-frontend:latest -f frontend/Dockerfile .
          docker build -t designpair-backend:latest backend/

      - name: Save Docker images
        run: docker save designpair-frontend:latest designpair-backend:latest | gzip > /tmp/designpair-images.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tyler.colberts.us >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us 'mkdir -p ~/designpair; cd ~/designpair && docker compose stop 2>/dev/null || true'
          scp -i ~/.ssh/deploy_key /tmp/designpair-images.tar.gz ec2-user@tyler.colberts.us:/tmp/designpair-images.tar.gz
          scp -i ~/.ssh/deploy_key docker-compose.yml ec2-user@tyler.colberts.us:~/designpair/docker-compose.yml

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us << 'DEPLOY'
            set -e
            cd ~/designpair

            # Load new images
            gunzip -c /tmp/designpair-images.tar.gz | docker load
            rm /tmp/designpair-images.tar.gz

            # Start services
            docker compose up -d --force-recreate

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8083/health > /dev/null 2>&1; then
                echo "Deploy successful — health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "WARNING: Health check did not pass within 60 seconds"
            docker compose logs --tail 20
            exit 1
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-pr:
    runs-on: large
    needs: lint-test-build
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          curl -sL https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz | tar -xz -C /tmp docker/docker
          cp /tmp/docker/docker /usr/local/bin/

      - name: Get PR number
        id: pr
        run: echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Build Docker images with PR base path
        run: |
          PR_NUM=${{ steps.pr.outputs.number }}

          # Build frontend with base path for PR preview
          docker build \
            --build-arg VITE_BASE=/pr/${PR_NUM}/ \
            -t designpair-frontend:pr-${PR_NUM} \
            -f frontend/Dockerfile.pr .

          docker build \
            -t designpair-backend:pr-${PR_NUM} \
            backend/

      - name: Save Docker images
        run: |
          PR_NUM=${{ steps.pr.outputs.number }}
          docker save designpair-frontend:pr-${PR_NUM} designpair-backend:pr-${PR_NUM} | gzip > /tmp/designpair-pr-images.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tyler.colberts.us >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          scp -i ~/.ssh/deploy_key /tmp/designpair-pr-images.tar.gz ec2-user@tyler.colberts.us:/tmp/designpair-pr-images.tar.gz
          scp -i ~/.ssh/deploy_key docker-compose.pr.yml ec2-user@tyler.colberts.us:/tmp/docker-compose.pr.yml
          scp -i ~/.ssh/deploy_key docker/deploy-pr.sh ec2-user@tyler.colberts.us:/tmp/deploy-pr.sh

      - name: Deploy PR preview
        run: |
          PR_NUM=${{ steps.pr.outputs.number }}
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us << DEPLOY
            set -e
            gunzip -c /tmp/designpair-pr-images.tar.gz | docker load
            rm /tmp/designpair-pr-images.tar.gz
            chmod +x /tmp/deploy-pr.sh
            /tmp/deploy-pr.sh ${PR_NUM}
          DEPLOY

      - name: Comment PR with preview URL
        run: |
          PR_NUM=${{ steps.pr.outputs.number }}
          # Use Gitea API to comment on the PR
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": \"Preview deployed at https://designpair.colberts.us/pr/${PR_NUM}/\"}" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/issues/${PR_NUM}/comments" || true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  teardown-pr:
    runs-on: small
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tyler.colberts.us >> ~/.ssh/known_hosts 2>/dev/null

      - name: Teardown PR preview
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          scp -i ~/.ssh/deploy_key docker/teardown-pr.sh ec2-user@tyler.colberts.us:/tmp/teardown-pr.sh
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us << DEPLOY
            chmod +x /tmp/teardown-pr.sh
            /tmp/teardown-pr.sh ${PR_NUM}
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  deploy-adrs:
    runs-on: large
    needs: lint-test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          curl -sL https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz | tar -xz -C /tmp docker/docker
          cp /tmp/docker/docker /usr/local/bin/

      - name: Clone ADR Insight
        run: git clone http://192.168.0.41:3000/tyler/adrinsight.git /tmp/adrinsight

      - name: Build ADR Insight image
        run: docker build -t adrinsight:designpair /tmp/adrinsight

      - name: Pre-build database
        run: |
          docker rm -f ollama 2>/dev/null || true
          docker run -d --name ollama ollama/ollama
          echo "Waiting for Ollama..."
          for i in $(seq 1 30); do
            if docker exec ollama ollama list >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec ollama ollama pull nomic-embed-text

          docker rm -f reindex 2>/dev/null || true
          docker create --name reindex \
            --link ollama:ollama \
            adrinsight:designpair \
            ./adr-insight reindex \
              --adr-dir /data/adr \
              --db /data/adr-insight.db \
              --ollama-url http://ollama:11434
          docker cp docs/adr/. reindex:/data/adr/
          docker start -a reindex
          docker cp reindex:/data/adr-insight.db /tmp/adr-insight.db

          docker rm reindex
          docker stop ollama
          docker rm ollama
          ls -lh /tmp/adr-insight.db

      - name: Save Docker image
        run: docker save adrinsight:designpair | gzip > /tmp/adrinsight-designpair.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tyler.colberts.us >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload to server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us 'mkdir -p ~/designpair-adrs/docs/adr; cd ~/designpair-adrs && docker compose -f docker-compose.prod.yml stop app 2>/dev/null || true'
          scp -i ~/.ssh/deploy_key /tmp/adrinsight-designpair.tar.gz ec2-user@tyler.colberts.us:/tmp/adrinsight-designpair.tar.gz
          scp -i ~/.ssh/deploy_key docker-compose.adrs.yml ec2-user@tyler.colberts.us:~/designpair-adrs/docker-compose.prod.yml
          scp -i ~/.ssh/deploy_key docs/adr/* ec2-user@tyler.colberts.us:~/designpair-adrs/docs/adr/
          scp -i ~/.ssh/deploy_key /tmp/adr-insight.db ec2-user@tyler.colberts.us:~/designpair-adrs/adr-insight.db

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ec2-user@tyler.colberts.us << 'DEPLOY'
            set -e
            cd ~/designpair-adrs

            docker network create portfolio 2>/dev/null || true

            if ! docker inspect portfolio-ollama >/dev/null 2>&1; then
              echo "Starting shared Ollama..."
              docker run -d \
                --name portfolio-ollama \
                --network portfolio \
                -e OLLAMA_KEEP_ALIVE=-1 \
                --restart unless-stopped \
                -v ollama-models:/root/.ollama \
                ollama/ollama

              echo "Waiting for Ollama to be ready..."
              for i in $(seq 1 30); do
                if docker exec portfolio-ollama ollama list >/dev/null 2>&1; then
                  break
                fi
                sleep 1
              done
              docker exec portfolio-ollama ollama pull nomic-embed-text
            fi

            gunzip -c /tmp/adrinsight-designpair.tar.gz | docker load
            rm /tmp/adrinsight-designpair.tar.gz

            docker compose -f docker-compose.prod.yml up -d --force-recreate app

            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8082/health > /dev/null 2>&1; then
                echo "Deploy successful — health check passed"
                exit 0
              fi
              sleep 2
            done
            echo "WARNING: Health check did not pass within 60 seconds"
            docker compose -f docker-compose.prod.yml logs --tail 20 app
            exit 1
          DEPLOY

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
